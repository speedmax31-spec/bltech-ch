<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>나의 PMS · 개인 업무 관리</title>
<style>
  :root {
    --bg: #f4f6fb;
    --panel: #ffffff;
    --text: #1f2433;
    --muted: #8a91a6;
    --line: #e8ebf3;
    --shadow: 0 6px 24px rgba(31, 36, 51, 0.06);
    --radius: 16px;

    --today: #ff5d73;
    --company: #4c7dff;
    --personal: #1fb98a;
    --growth: #9b6dff;
    --schedule: #ff9f43;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14161d;
      --panel: #1c1f29;
      --text: #e9ecf5;
      --muted: #8a91a6;
      --line: #2a2e3b;
      --shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic",
      "Apple SD Gothic Neo", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding: 28px 20px 80px;
  }

  .wrap { max-width: 1180px; margin: 0 auto; }

  /* ===== Header ===== */
  header.top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 26px;
  }
  .brand h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
  .brand .date { color: var(--muted); font-size: 14px; margin-top: 4px; }
  .save-status {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; margin-top: 8px; padding: 3px 10px; border-radius: 99px;
    background: var(--line); color: var(--muted);
  }
  .save-status.saved { background: color-mix(in srgb, var(--personal) 16%, transparent); color: var(--personal); }
  .save-status.saving { background: color-mix(in srgb, var(--company) 16%, transparent); color: var(--company); }
  .save-status.offline { background: color-mix(in srgb, var(--schedule) 18%, transparent); color: var(--schedule); }

  .overall {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 18px;
    min-width: 260px;
  }
  .overall .row {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 13px; color: var(--muted); margin-bottom: 8px;
  }
  .overall .row b { font-size: 20px; color: var(--text); font-weight: 800; }
  .bar { height: 8px; border-radius: 99px; background: var(--line); overflow: hidden; }
  .bar > span {
    display: block; height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--company), var(--personal));
    border-radius: 99px; transition: width .4s ease;
  }

  /* ===== Boards grid ===== */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
    gap: 18px;
  }
  .board.today { grid-column: 1 / -1; }

  .board {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px;
    display: flex;
    flex-direction: column;
    border-top: 3px solid var(--accent);
  }
  .board.today { background: linear-gradient(180deg, color-mix(in srgb, var(--today) 7%, var(--panel)), var(--panel)); }

  .board h2 {
    display: flex; align-items: center; gap: 9px;
    font-size: 16px; font-weight: 800; margin-bottom: 4px;
  }
  .dot { width: 11px; height: 11px; border-radius: 4px; background: var(--accent); flex: none; }
  .board .meta { font-size: 12.5px; color: var(--muted); margin-bottom: 14px; }
  .mini-bar { height: 5px; border-radius: 99px; background: var(--line); overflow: hidden; margin-bottom: 14px; }
  .mini-bar > span { display:block; height:100%; width:0%; background: var(--accent); border-radius:99px; transition: width .35s ease; }

  /* ===== Task list ===== */
  ul.tasks { list-style: none; display: flex; flex-direction: column; gap: 8px; min-height: 8px; }
  .board.today ul.tasks { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }

  li.task {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 11px;
    background: var(--bg);
    transition: border-color .15s, opacity .2s;
  }
  li.task:hover { border-color: color-mix(in srgb, var(--accent) 45%, var(--line)); }
  li.task.important { border-color: color-mix(in srgb, var(--accent) 60%, var(--line)); box-shadow: inset 3px 0 0 var(--accent); }
  li.task.done { opacity: .5; }
  li.task.done .txt { text-decoration: line-through; }

  .check {
    width: 19px; height: 19px; border-radius: 6px; flex: none; margin-top: 2px;
    border: 2px solid color-mix(in srgb, var(--accent) 55%, var(--muted));
    cursor: pointer; display: grid; place-items: center;
    background: transparent; transition: .15s;
  }
  .check.on { background: var(--accent); border-color: var(--accent); }
  .check svg { width: 11px; height: 11px; stroke: #fff; stroke-width: 3.2; fill: none; opacity: 0; }
  .check.on svg { opacity: 1; }

  .body { flex: 1; min-width: 0; }
  .txt { font-size: 14px; word-break: break-word; cursor: text; }
  .txt[contenteditable="true"] { outline: 2px solid var(--accent); border-radius: 4px; padding: 1px 4px; }
  .due { display: inline-block; font-size: 11.5px; color: var(--muted); margin-top: 3px; }
  .due.soon { color: var(--today); font-weight: 700; }

  .acts { display: flex; gap: 2px; flex: none; opacity: 0; transition: opacity .15s; }
  li.task:hover .acts { opacity: 1; }
  .acts button {
    border: none; background: transparent; cursor: pointer; padding: 3px;
    border-radius: 6px; color: var(--muted); font-size: 14px; line-height: 1;
  }
  .acts button:hover { background: var(--line); color: var(--text); }
  .acts .star.on { color: var(--accent); }

  .empty { font-size: 13px; color: var(--muted); padding: 12px 4px; text-align: center; }

  /* ===== Add form ===== */
  form.add { display: flex; gap: 7px; margin-top: 13px; }
  form.add input[type="text"] {
    flex: 1; min-width: 0; border: 1px solid var(--line); background: var(--bg);
    color: var(--text); border-radius: 10px; padding: 9px 12px; font-size: 13.5px;
  }
  form.add input[type="date"] {
    border: 1px solid var(--line); background: var(--bg); color: var(--text);
    border-radius: 10px; padding: 8px 9px; font-size: 12.5px; width: 132px;
  }
  form.add input:focus { outline: none; border-color: var(--accent); }
  form.add button {
    border: none; background: var(--accent); color: #fff; font-weight: 700;
    border-radius: 10px; padding: 0 15px; cursor: pointer; font-size: 18px;
  }
  form.add button:hover { filter: brightness(.95); }

  .board-foot { margin-top: 10px; display: flex; justify-content: flex-end; }
  .clear-done {
    border: none; background: transparent; color: var(--muted);
    font-size: 12px; cursor: pointer; padding: 2px 4px;
  }
  .clear-done:hover { color: var(--today); text-decoration: underline; }

  footer.tip { text-align: center; color: var(--muted); font-size: 12px; margin-top: 34px; }
  footer.tip kbd {
    background: var(--panel); border: 1px solid var(--line); border-radius: 5px;
    padding: 1px 6px; font-size: 11px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <h1 id="greet">나의 업무 관리</h1>
      <div class="date" id="today-date"></div>
      <div class="save-status" id="save-status">불러오는 중…</div>
    </div>
    <div class="overall">
      <div class="row"><span>오늘까지의 전체 진행률</span><b id="ov-pct">0%</b></div>
      <div class="bar"><span id="ov-bar"></span></div>
      <div class="row" style="margin:8px 0 0;"><span id="ov-text">할 일 0 · 완료 0</span></div>
    </div>
  </header>

  <div class="grid" id="grid"></div>

  <footer class="tip">
    내용을 <b>두 번 클릭</b>하면 바로 수정돼요 · ★ 로 중요 표시 · 모든 데이터는 이 브라우저에만 저장됩니다(localStorage)
  </footer>
</div>

<script>
(function () {
  "use strict";

  var STORE = "pms_tasks_v1";

  // 카테고리 정의 (순서대로 표시)
  var CATS = [
    { key: "today",    name: "오늘 꼭 할 일", icon: "🔥", color: "var(--today)",    hint: "오늘 안에 끝내야 하는 핵심 업무", due: false },
    { key: "company",  name: "회사 업무",     icon: "💼", color: "var(--company)",  hint: "진행 중인 회사 프로젝트와 업무", due: false },
    { key: "personal", name: "개인 업무",     icon: "🏠", color: "var(--personal)", hint: "회사 외 처리할 개인적인 일",     due: false },
    { key: "growth",   name: "자기계발",      icon: "📚", color: "var(--growth)",   hint: "공부 · 운동 · 성장을 위한 활동",  due: false },
    { key: "schedule", name: "개인 일정",     icon: "📅", color: "var(--schedule)", hint: "날짜가 있는 약속과 일정",         due: true }
  ];

  var tasks = [];
  var serverOK = false;       // 서버(디스크 저장) 사용 가능 여부
  var saveTimer = null;

  // 첫 실행 샘플 데이터
  function samples() {
    return [
      { id: uid(), cat: "today",    text: "이번 주 업무 우선순위 정리하기", done: false, important: true, due: "" },
      { id: uid(), cat: "today",    text: "오후 3시 팀 미팅 자료 검토",     done: false, important: false, due: "" },
      { id: uid(), cat: "company",  text: "프로젝트 기획안 초안 작성",       done: false, important: false, due: "" },
      { id: uid(), cat: "company",  text: "거래처 견적서 회신",             done: true,  important: false, due: "" },
      { id: uid(), cat: "personal", text: "은행 업무 처리",                 done: false, important: false, due: "" },
      { id: uid(), cat: "growth",   text: "영어 회화 30분",                done: false, important: false, due: "" },
      { id: uid(), cat: "schedule", text: "치과 예약", done: false, important: false, due: nextDateStr(3) }
    ];
  }

  function getLocal() {
    try { var raw = localStorage.getItem(STORE); if (raw) { var a = JSON.parse(raw); if (Array.isArray(a)) return a; } } catch (e) {}
    return null;
  }

  // 서버에서 불러오기. 서버 사용 불가(파일로 직접 열기 등)면 null 반환.
  function getServer() {
    return fetch("/api/tasks", { cache: "no-store" })
      .then(function (r) { if (!r.ok) throw 0; return r.json(); })
      .then(function (d) { return Array.isArray(d.tasks) ? d.tasks : []; })
      .catch(function () { return null; });
  }

  // ---------- 저장 ----------
  function save() {
    // 항상 브라우저에도 백업 (이중 안전장치)
    try { localStorage.setItem(STORE, JSON.stringify(tasks)); } catch (e) {}
    if (serverOK) {
      setStatus("saving");
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveServer, 250);
    }
  }
  function saveServer() {
    fetch("/api/tasks", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ tasks: tasks })
    })
      .then(function (r) { if (!r.ok) throw 0; setStatus("saved"); })
      .catch(function () { serverOK = false; setStatus("offline"); });
  }

  function setStatus(state) {
    var el = document.getElementById("save-status");
    if (!el) return;
    el.className = "save-status " + state;
    if (state === "saving") el.textContent = "💾 저장 중…";
    else if (state === "saved") el.textContent = "✓ 파일에 저장됨 (data.json)";
    else if (state === "offline") el.textContent = "⚠ 이 브라우저에만 저장 중 (start.bat 로 열면 파일 저장)";
  }

  // ---------- 유틸 ----------
  function uid() { return "t" + Math.floor(performance.now() * 1000) + "_" + (counter++); }
  var counter = 0;
  function nextDateStr(days) {
    var d = new Date(); d.setDate(d.getDate() + days);
    return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
  }
  function pad(n) { return n < 10 ? "0" + n : "" + n; }
  function esc(s) { return String(s).replace(/[&<>"']/g, function (c) {
    return { "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]; }); }

  // ---------- 날짜 표시 ----------
  function initDate() {
    var d = new Date();
    var days = ["일","월","화","수","목","금","토"];
    var h = d.getHours();
    var greet = h < 6 ? "늦은 밤이네요" : h < 12 ? "좋은 아침이에요" : h < 18 ? "오늘도 화이팅이에요" : "수고 많으셨어요";
    document.getElementById("greet").textContent = greet + " 👋";
    document.getElementById("today-date").textContent =
      d.getFullYear() + "년 " + (d.getMonth()+1) + "월 " + d.getDate() + "일 (" + days[d.getDay()] + ")";
    todayISO = d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate());
  }
  var todayISO = "";

  // ---------- 렌더 ----------
  function render() {
    var grid = document.getElementById("grid");
    grid.innerHTML = "";

    CATS.forEach(function (cat) {
      var items = tasks.filter(function (t) { return t.cat === cat.key; });
      // 정렬: 미완료 우선 → 중요 우선 → 일정은 날짜순
      items.sort(function (a, b) {
        if (a.done !== b.done) return a.done ? 1 : -1;
        if (cat.due && a.due && b.due) return a.due < b.due ? -1 : 1;
        if (a.important !== b.important) return a.important ? -1 : 1;
        return 0;
      });
      var doneN = items.filter(function (t) { return t.done; }).length;
      var pct = items.length ? Math.round(doneN / items.length * 100) : 0;

      var board = document.createElement("section");
      board.className = "board" + (cat.key === "today" ? " today" : "");
      board.style.setProperty("--accent", cat.color);

      var listHTML = items.length
        ? items.map(function (t) { return taskHTML(t, cat); }).join("")
        : '<div class="empty">아직 등록된 항목이 없어요. 아래에 추가해보세요 ✍️</div>';

      board.innerHTML =
        '<h2><span class="dot"></span>' + cat.icon + " " + cat.name + "</h2>" +
        '<div class="meta">' + cat.hint + "</div>" +
        '<div class="mini-bar"><span style="width:' + pct + '%"></span></div>' +
        '<ul class="tasks" data-cat="' + cat.key + '">' + listHTML + "</ul>" +
        '<form class="add" data-cat="' + cat.key + '">' +
          '<input type="text" placeholder="' + (cat.key==="today" ? "오늘 할 일 추가" : cat.name + " 추가") + '" required />' +
          (cat.due ? '<input type="date" />' : "") +
          '<button type="submit" title="추가">+</button>' +
        "</form>" +
        '<div class="board-foot">' +
          (doneN ? '<button class="clear-done" data-cat="' + cat.key + '">완료 ' + doneN + '개 비우기</button>' : "") +
        "</div>";

      grid.appendChild(board);
    });

    updateOverall();
  }

  function taskHTML(t, cat) {
    var dueHTML = "";
    if (cat.due && t.due) {
      var soon = t.due <= todayISO;
      var label = t.due === todayISO ? "오늘" : t.due < todayISO ? "지남 · " + t.due : t.due;
      dueHTML = '<span class="due' + (soon ? " soon" : "") + '">📅 ' + esc(label) + "</span>";
    }
    return '<li class="task' + (t.done ? " done" : "") + (t.important ? " important" : "") + '" data-id="' + t.id + '">' +
      '<div class="check' + (t.done ? " on" : "") + '" data-act="toggle" title="완료 표시">' +
        '<svg viewBox="0 0 14 14"><polyline points="2,7 6,11 12,3"></polyline></svg></div>' +
      '<div class="body">' +
        '<div class="txt" data-act="edit">' + esc(t.text) + "</div>" + dueHTML +
      "</div>" +
      '<div class="acts">' +
        '<button class="star' + (t.important ? " on" : "") + '" data-act="star" title="중요">' + (t.important ? "★" : "☆") + "</button>" +
        '<button data-act="del" title="삭제">🗑</button>' +
      "</div>" +
    "</li>";
  }

  function updateOverall() {
    var total = tasks.length;
    var done = tasks.filter(function (t) { return t.done; }).length;
    var pct = total ? Math.round(done / total * 100) : 0;
    document.getElementById("ov-pct").textContent = pct + "%";
    document.getElementById("ov-bar").style.width = pct + "%";
    document.getElementById("ov-text").textContent = "전체 " + total + "개 · 완료 " + done + "개 · 남음 " + (total - done) + "개";
  }

  // ---------- 액션 ----------
  function findIndex(id) {
    for (var i = 0; i < tasks.length; i++) if (tasks[i].id === id) return i;
    return -1;
  }

  document.getElementById("grid").addEventListener("click", function (e) {
    // 완료 비우기
    var clr = e.target.closest(".clear-done");
    if (clr) {
      var c = clr.getAttribute("data-cat");
      tasks = tasks.filter(function (t) { return !(t.cat === c && t.done); });
      save(); render(); return;
    }
    var li = e.target.closest("li.task");
    if (!li) return;
    var id = li.getAttribute("data-id");
    var actEl = e.target.closest("[data-act]");
    if (!actEl) return;
    var act = actEl.getAttribute("data-act");
    var i = findIndex(id);
    if (i < 0) return;

    if (act === "toggle") { tasks[i].done = !tasks[i].done; save(); render(); }
    else if (act === "star") { tasks[i].important = !tasks[i].important; save(); render(); }
    else if (act === "del") { tasks.splice(i, 1); save(); render(); }
    else if (act === "edit") { startEdit(actEl, id); }
  });

  function startEdit(el, id) {
    el.setAttribute("contenteditable", "true");
    el.focus();
    // 커서를 끝으로
    var r = document.createRange(); r.selectNodeContents(el); r.collapse(false);
    var sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(r);

    function finish(saveIt) {
      el.removeAttribute("contenteditable");
      el.removeEventListener("blur", onBlur);
      el.removeEventListener("keydown", onKey);
      var i = findIndex(id);
      if (i < 0) { render(); return; }
      if (saveIt) {
        var v = el.textContent.trim();
        if (v) tasks[i].text = v;
      }
      save(); render();
    }
    function onBlur() { finish(true); }
    function onKey(ev) {
      if (ev.key === "Enter") { ev.preventDefault(); finish(true); }
      else if (ev.key === "Escape") { ev.preventDefault(); finish(false); }
    }
    el.addEventListener("blur", onBlur);
    el.addEventListener("keydown", onKey);
  }

  document.getElementById("grid").addEventListener("submit", function (e) {
    e.preventDefault();
    var form = e.target.closest("form.add");
    if (!form) return;
    var cat = form.getAttribute("data-cat");
    var textInput = form.querySelector('input[type="text"]');
    var dateInput = form.querySelector('input[type="date"]');
    var text = textInput.value.trim();
    if (!text) return;
    tasks.push({
      id: uid(), cat: cat, text: text, done: false, important: false,
      due: dateInput ? dateInput.value : ""
    });
    save(); render();
    // 새로 그린 후 같은 폼에 포커스 유지
    var sel = document.querySelector('form.add[data-cat="' + cat + '"] input[type="text"]');
    if (sel) sel.focus();
  });

  // ---------- 시작 ----------
  initDate();

  getServer().then(function (server) {
    var local = getLocal();
    if (server === null) {
      // 서버 없음(파일로 직접 열거나 서버 꺼짐): 브라우저 저장만 사용
      serverOK = false;
      tasks = local || samples();
      setStatus("offline");
      render();
    } else if (server.length === 0 && local && local.length) {
      // 서버는 비었는데 브라우저에 기존 데이터가 있으면 → 파일로 이전(migrate)
      serverOK = true;
      tasks = local;
      render();
      saveServer();
    } else if (server.length === 0) {
      // 완전 첫 실행: 샘플로 시작하고 파일에 저장
      serverOK = true;
      tasks = samples();
      render();
      saveServer();
    } else {
      serverOK = true;
      tasks = server;
      setStatus("saved");
      render();
    }
  });
})();
</script>
</body>
</html>
